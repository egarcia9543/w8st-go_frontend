<div class="flex min-h-svh items-center justify-center bg-background px-4">
  <section class="w-full max-w-sm rounded-2xl bg-card p-8 shadow-sm text-center">
    <ng-lottie [options]="loginAnimation" />

    <h1 class="text-2xl font-bold text-foreground">{{ 'login.title' | translate }}</h1>
    <p class="mt-2 text-sm text-muted-foreground">{{ 'login.subtitle' | translate }}</p>

    <button hlmBtn type="button" class="mt-6 w-full" (click)="loginWithGoogle()">
      {{ 'login.loginWithGoogle' | translate }}
    </button>
  </section>
</div>
