<section class="p-8">
  <h1 class="text-2xl font-bold text-foreground">
    Hola, {{ facade.sessionState().user?.userName }}
  </h1>
  <p class="mt-1 text-sm text-muted-foreground">

  <button hlmBtn variant="outline" type="button" class="mt-6 cursor-pointer" (click)="logout()">
    {{ 'dashboard.logout' | translate }}
